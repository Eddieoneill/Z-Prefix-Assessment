services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./server:/src/app
      - /src/app/node_modules
    command: sh -c "npx knex migrate:latest && npx knex seed:run && npm run start"

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./client:/app
      - /app/node_modules
